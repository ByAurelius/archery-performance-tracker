{% extends 'base.html' %}
{% block content %}
<div class="row">
    <div class="col-md-5 mb-4">
        <div class="card shadow border-danger">
            <div class="card-header bg-danger text-white text-center">
                <h5 class="mb-0">Interactive Target Face</h5>
            </div>
            <div class="card-body text-center">
                <p class="text-muted small">Click on the target to record your arrows.</p>
                <canvas id="targetCanvas" width="400" height="400" style="cursor: crosshair; border-radius: 50%; box-shadow: 0px 0px 15px rgba(0,0,0,0.2);"></canvas>
                <div class="mt-3">
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="undoLastArrow()">Undo Last Arrow</button>
                    <button type="button" class="btn btn-sm btn-outline-danger" onclick="clearTarget()">Clear All</button>
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-7">
        <div class="card shadow">
            <div class="card-body">
                <h4 class="card-title text-center mb-4">Official Scorecard</h4>

                <!-- enctype="multipart/form-data" resim yuklemek icin HAYATI onem tasir -->
                <form method="POST" action="/add_score" id="scoreForm" enctype="multipart/form-data">
                    <div class="row mb-3">
                        <div class="col-4">
                            <label class="form-label fw-bold">Date:</label>
                            <input type="date" name="date" id="trainingDate" class="form-control" required>
                        </div>
                        <div class="col-4">
                            <label class="form-label fw-bold">Distance (m):</label>
                            <input type="number" name="distance" class="form-control" required>
                        </div>
                        <div class="col-4">
                            <label class="form-label fw-bold">Arrows per End:</label>
                            <select name="arrows_per_end" id="arrowsPerEndSelect" class="form-select" onchange="changeArrowConfig()">
                                <option value="3">3 Arrows</option>
                                <option value="6" selected>6 Arrows</option>
                            </select>
                        </div>
                    </div>

                    <!-- YENİ EKLENEN: Fotoğraf Kanıtı Yükleme Alanı -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">Target Photo Proof (Optional):</label>
                        <input type="file" name="target_image" class="form-control" accept="image/*">
                    </div>

                    <div class="row mb-3 bg-light p-2 rounded border">
                        <div class="col-6 text-center">
                            <label class="form-label text-muted mb-0">Total Arrows Shot</label>
                            <h3 id="displayArrowsShot" class="text-primary mb-0">0</h3>
                            <input type="hidden" name="arrows_shot" id="inputArrowsShot" value="0">
                        </div>
                        <div class="col-6 text-center">
                            <label class="form-label text-muted mb-0">Total Score</label>
                            <h3 id="displayTotalScore" class="text-success mb-0">0</h3>
                            <input type="hidden" name="total_score" id="inputTotalScore" value="0">
                        </div>
                    </div>

                    <input type="hidden" name="arrow_data" id="arrowDataInput">

                    <div class="table-responsive mb-4 border rounded">
                        <table class="table table-sm table-bordered text-center align-middle mb-0" id="scoreTable">
                            <thead class="table-dark">
                                <tr id="tableHeaderRow"></tr>
                            </thead>
                            <tbody id="scoreTableBody"></tbody>
                        </table>
                    </div>

                    <button type="submit" class="btn btn-success w-100 fw-bold fs-5">Save to My Trainings</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('trainingDate').valueAsDate = new Date();
    const canvas = document.getElementById('targetCanvas');
    const ctx = canvas.getContext('2d');
    let arrows = [];

    function drawTarget() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const centerX = 200, centerY = 200;
        const ringColors = ['#ffffff', '#ffffff', '#000000', '#000000', '#00aae4', '#00aae4', '#f22020', '#f22020', '#ffe552', '#ffe552'];

        for (let i = 1; i <= 10; i++) {
            ctx.beginPath();
            ctx.arc(centerX, centerY, 200 - ((i - 1) * 20), 0, 2 * Math.PI);
            ctx.fillStyle = ringColors[i - 1];
            ctx.fill();
            ctx.lineWidth = 1;
            ctx.strokeStyle = (i >= 3 && i <= 4) ? '#ffffff' : '#000000';
            ctx.stroke();
        }
        ctx.beginPath();
        ctx.arc(centerX, centerY, 10, 0, 2 * Math.PI);
        ctx.strokeStyle = '#000000';
        ctx.stroke();
    }

    canvas.addEventListener('click', function(event) {
        let arrowsPerEnd = parseInt(document.getElementById('arrowsPerEndSelect').value);
        let maxArrows = 12 * arrowsPerEnd;

        if (arrows.length >= maxArrows) {
            alert("Scorecard is full! (12 ends completed)");
            return;
        }

        const rect = canvas.getBoundingClientRect();
        const x = event.clientX - rect.left;
        const y = event.clientY - rect.top;
        const distance = Math.sqrt(Math.pow(x - 200, 2) + Math.pow(y - 200, 2));

        let score = distance <= 200 ? Math.max(1, Math.ceil((200 - distance) / 20)) : 0;

        arrows.push({ x: x, y: y, score: score });

        let currentSetIndex = Math.floor((arrows.length - 1) / arrowsPerEnd);
        let setStart = currentSetIndex * arrowsPerEnd;
        let currentSetArrows = arrows.slice(setStart);
        currentSetArrows.sort((a, b) => b.score - a.score);
        arrows.splice(setStart, currentSetArrows.length, ...currentSetArrows);

        updateScreen();
    });

    function drawArrows() {
        arrows.forEach(arrow => {
            ctx.beginPath();
            ctx.moveTo(arrow.x - 6, arrow.y - 6); ctx.lineTo(arrow.x + 6, arrow.y + 6);
            ctx.moveTo(arrow.x + 6, arrow.y - 6); ctx.lineTo(arrow.x - 6, arrow.y + 6);
            ctx.strokeStyle = (arrow.score === 3 || arrow.score === 4) ? '#ffffff' : '#000000';
            ctx.lineWidth = 3;
            ctx.stroke();
        });
    }

    function changeArrowConfig() {
        if(arrows.length > 0) {
            if(confirm("Changing the configuration will clear your current arrows. Proceed?")) {
                arrows = [];
            } else {
                document.getElementById('arrowsPerEndSelect').value = document.getElementById('arrowsPerEndSelect').value == "3" ? "6" : "3";
                return;
            }
        }
        updateScreen();
    }

    function updateScreen() {
        drawTarget();
        drawArrows();

        let arrowsPerEnd = parseInt(document.getElementById('arrowsPerEndSelect').value);

        let theadRow = document.getElementById('tableHeaderRow');
        let headerHtml = `<th>End</th>`;
        for(let i=1; i<=arrowsPerEnd; i++) { headerHtml += `<th>${i}</th>`; }
        headerHtml += `<th class="bg-primary text-white">E.T.</th><th class="bg-success text-white">R.T.</th>`;
        theadRow.innerHTML = headerHtml;

        const tbody = document.getElementById('scoreTableBody');
        tbody.innerHTML = '';

        let runningTotal = 0;

        for (let i = 0; i < 12; i++) {
            let tr = document.createElement('tr');
            let rowHtml = `<td><strong>${i + 1}</strong></td>`;

            let endTotal = 0;
            let endHasArrows = false;

            for (let j = 0; j < arrowsPerEnd; j++) {
                let arrowIndex = (i * arrowsPerEnd) + j;
                if (arrows[arrowIndex]) {
                    let s = arrows[arrowIndex].score;
                    let displayScore = s === 0 ? 'M' : (s === 10 ? 'X/10' : s);

                    let bgColor = "";
                    if(s >= 9) bgColor = "bg-warning text-dark";
                    else if(s >= 7) bgColor = "bg-danger text-white";
                    else if(s >= 5) bgColor = "bg-info text-dark";
                    else if(s >= 3) bgColor = "bg-dark text-white";

                    rowHtml += `<td class="${bgColor} fw-bold">${displayScore}</td>`;
                    endTotal += s;
                    endHasArrows = true;
                } else {
                    rowHtml += `<td></td>`;
                }
            }

            if (endHasArrows) runningTotal += endTotal;

            rowHtml += `<td class="bg-light fw-bold text-primary">${endHasArrows ? endTotal : ''}</td>`;
            rowHtml += `<td class="bg-light fw-bold text-success">${endHasArrows ? runningTotal : ''}</td>`;

            tr.innerHTML = rowHtml;
            tbody.appendChild(tr);
        }

        document.getElementById('displayArrowsShot').innerText = arrows.length;
        document.getElementById('inputArrowsShot').value = arrows.length;
        document.getElementById('displayTotalScore').innerText = runningTotal;
        document.getElementById('inputTotalScore').value = runningTotal;
        document.getElementById('arrowDataInput').value = JSON.stringify(arrows);
    }

    function undoLastArrow() { arrows.pop(); updateScreen(); }
    function clearTarget() { arrows = []; updateScreen(); }

    updateScreen();
</script>
{% endblock %}
