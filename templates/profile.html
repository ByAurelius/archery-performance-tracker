{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow border-info">
            <div class="card-body">
                <h3 class="card-title text-center text-info mb-4">Edit Profile</h3>
                <form method="POST" action="/profile">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">First Name:</label>
                            <input type="text" name="first_name" class="form-control" value="{{ archer.first_name or '' }}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Last Name:</label>
                            <input type="text" name="last_name" class="form-control" value="{{ archer.last_name or '' }}">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-3">
                            <label class="form-label">Age:</label>
                            <input type="number" name="age" class="form-control" value="{{ archer.age or '' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Height (cm):</label>
                            <input type="number" step="0.1" name="height" class="form-control" value="{{ archer.height or '' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Weight (kg):</label>
                            <input type="number" step="0.1" name="weight" class="form-control" value="{{ archer.weight or '' }}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Draw Length:</label>
                            <input type="number" step="0.1" name="draw_length" class="form-control" value="{{ archer.draw_length or '' }}">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-info text-white w-100 mt-3">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
